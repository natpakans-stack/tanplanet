name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 09:00 UTC (16:00 Bangkok)
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Secret Lives of Color DB
        run: |
          curl -sSf "https://nveyjftyclwvvgudynqt.supabase.co/rest/v1/colors?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_SLOC }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_SLOC }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
