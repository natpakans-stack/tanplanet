# Keeps the free-tier Supabase project from auto-pausing (pauses after 7 days idle).
# Runs a tiny read every 3 days. Needs repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.
name: supabase-keepalive

on:
  schedule:
    - cron: "0 3 */3 * *" # every 3 days, 03:00 UTC (buffer under the 7-day limit)
  workflow_dispatch: {}      # allow manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -fsS -o /dev/null -w "%{http_code}\n" \
            "$SUPABASE_URL/rest/v1/projects?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
