<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="16" y1="44" x2="112" y2="44" stroke="#313244" stroke-width="1.5"/>
  <line x1="44" y1="16" x2="44" y2="112" stroke="#313244" stroke-width="1.5"/>
  <!-- Inspect frame -->
  <rect x="28" y="28" width="72" height="72" rx="8" fill="none" stroke="#7aa2f7" stroke-width="3" stroke-dasharray="8 4"/>
  <!-- Center crosshair -->
  <circle cx="64" cy="64" r="12" fill="rgba(122,162,247,0.15)" stroke="#7aa2f7" stroke-width="2.5"/>
  <line x1="64" y1="48" x2="64" y2="80" stroke="#7aa2f7" stroke-width="1.5" opacity="0.5"/>
  <line x1="48" y1="64" x2="80" y2="64" stroke="#7aa2f7" stroke-width="1.5" opacity="0.5"/>
  <!-- Claude dot -->
  <circle cx="96" cy="96" r="10" fill="#a6e3a1"/>
  <text x="96" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e2e" font-family="sans-serif">C</text>
</svg>
