<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <svg class="popup-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="3" stroke="#7aa2f7" stroke-width="2"/>
        <line x1="3" y1="9" x2="21" y2="9" stroke="#7aa2f7" stroke-width="1.5" opacity="0.5"/>
        <line x1="9" y1="9" x2="9" y2="21" stroke="#7aa2f7" stroke-width="1.5" opacity="0.5"/>
        <circle cx="15" cy="15" r="3" fill="#7aa2f7" opacity="0.3" stroke="#7aa2f7" stroke-width="1.5"/>
      </svg>
      <h1>Design Inspector</h1>
    </div>

    <div class="popup-body">
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Inactive</span>
      </div>
      <button class="toggle-btn" id="toggleBtn">Enable</button>
    </div>

    <div class="copy-mode-section">
      <div class="section-label">Copy Sections</div>
      <div class="copy-mode-options" id="copyModeOptions">
        <label class="copy-mode-option">
          <input type="checkbox" name="copySections" value="element">
          <span class="option-label">Element & Path</span>
        </label>
        <label class="copy-mode-option">
          <input type="checkbox" name="copySections" value="styles">
          <span class="option-label">CSS Styles</span>
        </label>
<label class="copy-mode-option">
          <input type="checkbox" name="copySections" value="classname">
          <span class="option-label">Classname Only</span>
        </label>
      </div>
    </div>

    <div class="popup-footer">
      Click an element to inspect & copy
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
