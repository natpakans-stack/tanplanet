<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MegaCoach · กรอกพอร์ต</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#222;--ink2:#666;--ink3:#9a9aa2;--bd:#e6e6ec;--bg:#f5f6f8;--surface:#fff;--accent:#3b4ee0;--accent-soft:#eef0fd;--go:#1d9a5b;--err:#c0392b;--r:14px}
  *{box-sizing:border-box}
  body{font-family:"Anuphan",system-ui,sans-serif;color:var(--ink);background:var(--bg);margin:0;padding:20px 14px 56px;line-height:1.5}
  .wrap{max-width:540px;margin:0 auto}
  h1{font-size:18px;font-weight:700;margin:0 0 3px}
  .sub{color:var(--ink2);font-size:12.5px;margin:0 0 18px}

  .card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:13px;transition:box-shadow .15s,border-color .15s}
  .card.editing{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
  .chead h2{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;margin:0}
  .iconbtn{border:1px solid var(--bd);background:var(--surface);color:var(--ink2);border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;transition:.12s}
  .iconbtn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  .kv{margin:0;display:flex;flex-direction:column;gap:9px}
  .kv>div{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .kv dt{margin:0;font-size:13px;color:var(--ink2)}
  .kv dd{margin:0;font-size:15px;font-weight:600;font-family:"IBM Plex Mono",monospace}
  .empty{font-size:13px;color:var(--ink3);font-style:italic}
  .flist{display:flex;flex-direction:column;gap:11px}
  .frow{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .fname{font-size:14px;font-weight:600}.fmeta{font-size:11px;color:var(--ink3)}
  .fval{font-size:14px;font-weight:600;font-family:"IBM Plex Mono",monospace;white-space:nowrap}
  .ftot{margin-top:11px;padding-top:11px;border-top:1px dashed var(--bd);display:flex;justify-content:space-between;font-size:13px;color:var(--ink2)}
  .ftot b{font-family:"IBM Plex Mono",monospace;color:var(--ink)}

  .rmf{margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f3}
  .rmf-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px}
  .rmf-top b{font-family:"IBM Plex Mono",monospace}
  .bar{height:9px;background:#ececf1;border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:6px;transition:width .25s ease}
  .rmf-sub{display:flex;justify-content:space-between;font-size:11.5px;margin-top:6px}
  .rmf-sub .ok{color:var(--go);font-weight:600}.rmf-sub .muted{color:var(--ink3)}.rmf-sub .err{color:var(--err);font-weight:600}

  label.fld{display:block;font-size:12px;color:var(--ink2);margin-bottom:10px}
  input{width:100%;font:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--bd);border-radius:9px;background:var(--surface);color:var(--ink);margin-top:5px}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  input[inputmode=decimal]{font-family:"IBM Plex Mono",monospace}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .hint{font-size:11px;color:var(--ink3);margin-top:4px}
  .erow{display:grid;gap:7px;align-items:center;margin-bottom:8px}
  .erow.fund{grid-template-columns:1.3fr 1fr 1fr 1.3fr auto}
  .erow.pos{grid-template-columns:2fr 1fr auto}
  .erow input{margin-top:0}
  .del{border:none;background:#fbe9e9;color:var(--err);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:13px}
  .add{margin-top:2px;border:1px dashed var(--bd);background:transparent;color:var(--accent);border-radius:9px;padding:8px 12px;cursor:pointer;font:inherit;font-size:13px;font-weight:600}
  .eact{display:flex;gap:9px;margin-top:14px}
  .save{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font:inherit;font-size:14px;font-weight:700;cursor:pointer}
  .save:disabled{opacity:.5;cursor:default}
  .cancel{background:transparent;color:var(--ink2);border:1px solid var(--bd);border-radius:10px;padding:10px 18px;font:inherit;font-size:14px;font-weight:600;cursor:pointer}

  .foot{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12.5px;color:var(--ink2)}
  .foot input{width:auto;margin:0}
  .msg{border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.5}
  .msg.ok{background:#e6f6ec;color:#147a45}.msg.err{background:#fbe9e9;color:var(--err)}
  #app{display:none}
  .lock{max-width:380px;margin:36px auto 0;text-align:center}
  .lock .ic{font-size:34px}.lock p{color:var(--ink2);font-size:13px}
  .lock input{margin:14px 0 10px;text-align:center}
  @media(max-width:540px){.erow.fund{grid-template-columns:1fr 1fr;gap:6px}.erow.fund .del{grid-column:span 2;width:100%}.erow.pos{grid-template-columns:1fr auto}}
</style></head><body><div class="wrap">

  <div id="gate" class="lock card">
    <div class="ic">🔒</div>
    <h1 style="margin-top:8px">กรอกพอร์ต MegaCoach</h1>
    <p>ใส่ passphrase เดียวกับ dashboard เพื่อปลดล็อก<br>(ตัวเลขเข้ารหัสในเครื่องก่อนส่ง — zero-knowledge)</p>
    <input id="pass" type="password" placeholder="passphrase" autocomplete="off">
    <button class="save" id="unlock" style="width:100%">ปลดล็อก</button>
    <div id="gateMsg" class="hint" style="margin-top:10px"></div>
  </div>

  <div id="app">
    <h1>📝 พอร์ต MegaCoach</h1>
    <p class="sub">แตะ ✏️ เพื่อแก้ทีละการ์ด · เข้ารหัสในเครื่อง → relay → Mac อัปเดต · ตัวเลขไม่รั่ว</p>
    <div id="msg"></div>
    <div id="cards"></div>
    <label class="foot"><input type="checkbox" id="push" checked> push deploy เมื่อบันทึก</label>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const LIFF_ID = "2010317620-8kmrWr97";
  const INBOX = "/api/holdings-inbox";
  const ITER = 250000;
  let KEY = null, DATA = {}, editing = null, busy = false;

  const b64e = u => btoa(String.fromCharCode(...new Uint8Array(u)));
  const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const tenc = new TextEncoder(), tdec = new TextDecoder();

  async function deriveKey(pass, salt){
    const base = await crypto.subtle.importKey("raw", tenc.encode(pass), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"}, base, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);
  }
  async function encryptObj(pass, obj){
    const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(pass, salt);
    const ct = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, tenc.encode(JSON.stringify(obj)));
    return {v:1,kdf:"PBKDF2",hash:"SHA-256",iter:ITER,salt:b64e(salt),iv:b64e(iv),ct:b64e(ct)};
  }
  async function decryptBlob(pass, blob){
    const key = await deriveKey(pass, b64d(blob.salt));
    const pt = await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(blob.iv)}, key, b64d(blob.ct));
    return JSON.parse(tdec.decode(pt));
  }

  const $ = s => document.getElementById(s);
  const fmt = n => (n==null||n==="") ? "—" : Number(n).toLocaleString("th-TH");
  const num = v => { const n = parseFloat(String(v??"").replace(/,/g,"").trim()); return isNaN(n)?0:n; };
  const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

  function rmf(){
    const c=num(DATA.rmfContributedTHB), t=num(DATA.rmfTargetTHB), inc=num(DATA.incomeTHB);
    const cap=Math.min(inc*0.3,500000), left=Math.max(0,t-c), pct=t?Math.min(100,Math.round(c/t*100)):0;
    return {c,t,inc,cap,left,pct,done:t&&c>=t,over:cap&&c>cap};
  }

  function taxView(){
    const r=rmf();
    const rmfBlock = r.t ? `<div class="rmf">
      <div class="rmf-top"><span>RMF ปีนี้</span><b>${fmt(r.c)} / ${fmt(r.t)} ฿</b></div>
      <div class="bar"><i style="width:${r.pct}%;background:${r.done?"var(--go)":"var(--accent)"}"></i></div>
      <div class="rmf-sub">
        <span class="${r.done?"ok":""}">${r.done?"✅ ถึงเป้าโซน 10% แล้ว":"เหลืออีก "+fmt(r.left)+" ฿"}</span>
        ${r.cap?`<span class="${r.over?"err":"muted"}">เพดาน 30% ${fmt(r.cap)}${r.over?" ⚠️":""}</span>`:""}
      </div></div>` : "";
    return `<dl class="kv">
      <div><dt>เงินสด</dt><dd>${fmt(DATA.cashTHB)} ฿</dd></div>
      <div><dt>รายได้พึงประเมิน/ปี</dt><dd>${fmt(DATA.incomeTHB)} ฿</dd></div>
    </dl>${rmfBlock}`;
  }
  function taxEdit(){
    return `<div class="grid2">
      <label class="fld">เงินสด (฿)<input data-k="cashTHB" inputmode="decimal" value="${DATA.cashTHB??""}"></label>
      <label class="fld">รายได้พึงประเมิน/ปี<input data-k="incomeTHB" inputmode="decimal" value="${DATA.incomeTHB??""}"><span class="hint">คำนวณเพดาน RMF 30%</span></label>
    </div>
    <div class="grid2">
      <label class="fld">ยอดซื้อ RMF สะสมปีนี้<input data-k="rmfContributedTHB" inputmode="decimal" value="${DATA.rmfContributedTHB??""}"></label>
      <label class="fld">เป้า RMF ปีนี้<input data-k="rmfTargetTHB" inputmode="decimal" value="${DATA.rmfTargetTHB??""}"><span class="hint">โซน 10% (อัปปีละครั้ง)</span></label>
    </div>`;
  }

  function fundsView(){
    const fs = DATA.fundsTHB||[];
    if(!fs.length) return `<p class="empty">ยังไม่มีกองทุน</p>`;
    const total = fs.reduce((s,f)=>s+(f.valueTHB||0),0);
    return `<div class="flist">${fs.map(f=>`<div class="frow">
      <div><div class="fname">${esc(f.name)}</div>${f.type?`<div class="fmeta">${esc(f.type)}</div>`:""}</div>
      <div class="fval">${fmt(f.valueTHB)} ฿</div></div>`).join("")}</div>
    <div class="ftot"><span>รวม ${fs.length} กอง</span><b>${fmt(total)} ฿</b></div>`;
  }
  function fundRowEdit(f={}){
    return `<div class="erow fund">
      <input class="fn" placeholder="ชื่อกอง" value="${esc(f.name)}">
      <input class="ft" placeholder="ประเภท" value="${esc(f.type)}">
      <input class="fv" inputmode="decimal" placeholder="มูลค่า ฿" value="${f.valueTHB??""}">
      <input class="fnote" placeholder="หมายเหตุ" value="${esc(f.note)}">
      <button type="button" class="del" onclick="this.parentElement.remove()">✕</button></div>`;
  }
  function fundsEdit(){
    return `<div id="funds">${(DATA.fundsTHB||[]).map(fundRowEdit).join("")}</div>
      <button type="button" class="add" onclick="document.getElementById('funds').insertAdjacentHTML('beforeend', window.__fundRow())">+ เพิ่มกอง</button>`;
  }

  function posView(){
    const ps = DATA.positions||[];
    if(!ps.length) return `<p class="empty">ยังไม่มีหุ้น</p>`;
    return `<div class="flist">${ps.map(p=>`<div class="frow">
      <div class="fname">${esc(p.ticker)}</div><div class="fval">${p.shares} หุ้น</div></div>`).join("")}</div>`;
  }
  function posRowEdit(p={}){
    return `<div class="erow pos">
      <input class="pt" placeholder="Ticker (เช่น NVDA)" value="${esc(p.ticker)}">
      <input class="ps" inputmode="decimal" placeholder="จำนวนหุ้น" value="${p.shares??""}">
      <button type="button" class="del" onclick="this.parentElement.remove()">✕</button></div>`;
  }
  function posEdit(){
    return `<div id="pos">${(DATA.positions||[]).map(posRowEdit).join("")}</div>
      <button type="button" class="add" onclick="document.getElementById('pos').insertAdjacentHTML('beforeend', window.__posRow())">+ เพิ่มหุ้น</button>`;
  }
  window.__fundRow = () => fundRowEdit();
  window.__posRow  = () => posRowEdit();

  const CARDS = [
    { id:"tax",   title:"เงินสด & ภาษี",       view:taxView,   edit:taxEdit },
    { id:"funds", title:"กองทุน (กรอกมือ)",    view:fundsView, edit:fundsEdit },
    { id:"pos",   title:"หุ้น Dime (ราคาสด)",  view:posView,   edit:posEdit },
  ];
  function render(){
    $("cards").innerHTML = CARDS.map(c=>{
      const on = editing===c.id;
      return `<section class="card${on?" editing":""}" data-card="${c.id}">
        <div class="chead"><h2>${c.title}</h2>
          ${on?"":`<button class="iconbtn" onclick="startEdit('${c.id}')" title="แก้ไข">✏️</button>`}</div>
        <div class="cbody">${on?c.edit():c.view()}</div>
        ${on?`<div class="eact"><button class="save" onclick="save('${c.id}')">💾 บันทึก</button><button class="cancel" onclick="cancel()">ยกเลิก</button></div>`:""}
      </section>`;
    }).join("");
  }
  function startEdit(id){ if(busy)return; editing=id; render(); }
  function cancel(){ editing=null; render(); }
  window.startEdit=startEdit; window.cancel=cancel;

  function collect(id){
    if(id==="tax"){
      document.querySelectorAll('[data-card="tax"] [data-k]').forEach(el=>{ DATA[el.dataset.k]=num(el.value); });
    } else if(id==="funds"){
      DATA.fundsTHB = [...document.querySelectorAll("#funds .erow")].map(r=>({
        name:r.querySelector(".fn").value.trim(), type:r.querySelector(".ft").value.trim(),
        valueTHB:num(r.querySelector(".fv").value), note:r.querySelector(".fnote").value.trim()
      })).filter(x=>x.name);
    } else if(id==="pos"){
      DATA.positions = [...document.querySelectorAll("#pos .erow")].map(r=>({
        ticker:r.querySelector(".pt").value.trim().toUpperCase(), shares:num(r.querySelector(".ps").value)
      })).filter(x=>x.ticker);
    }
  }
  function showMsg(cls, html){ const m=$("msg"); m.className="msg "+cls; m.innerHTML=html; window.scrollTo(0,0); }

  async function unlock(){
    const pass = $("pass").value; if(!pass){ $("gateMsg").textContent="ใส่ passphrase ก่อน"; return; }
    $("gateMsg").textContent="กำลังตรวจ...";
    let h = {};
    try {
      const r = await fetch(INBOX + "?t=" + Date.now());
      if(r.ok){ const blob = await r.json(); if(blob && blob.ct){ h = await decryptBlob(pass, blob); } }
    } catch(e){ /* ไม่มีข้อมูลเดิม = เริ่มเปล่า */ }
    KEY = pass; DATA = h;
    $("gate").style.display="none"; $("app").style.display="block";
    render();
  }
  async function save(id){
    if(busy)return; busy=true;
    collect(id);
    const btn=document.querySelector('[data-card="'+id+'"] .save'); if(btn){btn.disabled=true;btn.textContent="⏳ กำลังส่ง...";}
    try {
      const h = {...DATA}; delete h._seed; h.push = $("push").checked;
      const blob = await encryptObj(KEY, h);
      const r = await fetch(INBOX, {method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(blob)});
      if(!r.ok) throw new Error("relay " + r.status);
      editing=null; render();
      showMsg("ok", "✅ ส่งแล้ว — Mac จะดึงไปอัปเดตรอบถัดไป (หรือรัน <b>bun pull-holdings.mjs</b>)");
      if(window.liff && liff.isInClient && liff.isInClient()) setTimeout(()=>liff.closeWindow(), 1800);
    } catch(e){
      editing=null; render(); showMsg("err", "❌ ส่งไม่สำเร็จ: " + e.message);
    }
    busy=false;
  }
  window.save=save;

  $("unlock").addEventListener("click", unlock);
  $("pass").addEventListener("keydown", e=>{ if(e.key==="Enter") unlock(); });
  if(window.liff) liff.init({liffId:LIFF_ID}).catch(()=>{});
</script>
</body></html>
